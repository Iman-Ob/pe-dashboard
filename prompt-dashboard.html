<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Prompt Engineering Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Dubai:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<style>
/* ─── DESIGN TOKENS ─── */
:root {
  --font-mono: 'Courier New', Courier, monospace;
  --font-ui: 'Dubai', 'Segoe UI', system-ui, sans-serif;
  --radius: 4px;
  --radius-lg: 8px;
  --transition: 0.18s ease;
  --topbar-h: 52px;
  --bottomnav-h: 56px;
}

[data-theme="dark"] {
  --bg: #0a0f0c;
  --bg-2: #101710;
  --bg-3: #172017;
  --border: #1e3022;
  --border-active: #34d464;
  --text: #e2f0e6;
  --text-muted: #5a8a65;
  --text-dim: #7aaa84;
  --accent: #34d464;
  --accent-2: #059669;
  --accent-glow: rgba(52,212,100,0.15);
  --preview-bg: #0c1410;
  --preview-border: #1e3222;
  --tag-bg: rgba(52,212,100,0.10);
  --toast-bg: #172017;
  --card-hover: #141f14;
  --status-filled: #34d464;
  --status-empty: #1e3022;
  --btn-primary: #22c55e;
  --btn-primary-hover: #34d464;
  --btn-ghost: transparent;
  --btn-ghost-hover: #172017;
  --scrollbar: #1e3022;
  --scrollbar-thumb: #2a4a30;
}

[data-theme="light"] {
  --bg: #f0faf2;
  --bg-2: #ffffff;
  --bg-3: #e6f5ea;
  --border: #b6dfc0;
  --border-active: #16a34a;
  --text: #0a1f0e;
  --text-muted: #4a7a57;
  --text-dim: #2d6040;
  --accent: #16a34a;
  --accent-2: #059669;
  --accent-glow: rgba(22,163,74,0.10);
  --preview-bg: #f5fcf7;
  --preview-border: #c4e8ce;
  --tag-bg: rgba(22,163,74,0.08);
  --toast-bg: #0a1f0e;
  --card-hover: #e6f5ea;
  --status-filled: #16a34a;
  --status-empty: #b6dfc0;
  --btn-primary: #16a34a;
  --btn-primary-hover: #15803d;
  --btn-ghost: transparent;
  --btn-ghost-hover: #e6f5ea;
  --scrollbar: #d4edda;
  --scrollbar-thumb: #a8d4b4;
}

/* ─── RESET ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: var(--font-ui);
  background: var(--bg);
  color: var(--text);
  font-size: 16px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--scrollbar); }
::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }
button { cursor: pointer; font-family: var(--font-ui); border: none; outline: none; }
input, textarea { font-family: var(--font-ui); outline: none; border: none; }
a { text-decoration: none; color: inherit; }

/* ─── LAYOUT SHELL ─── */
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;
}

/* ─── TOPBAR ─── */
#topbar {
  height: var(--topbar-h);
  min-height: var(--topbar-h);
  background: var(--bg-2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  z-index: 100;
  flex-shrink: 0;
}
#logo {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: var(--accent);
  font-family: var(--font-mono);
  text-transform: uppercase;
  white-space: nowrap;
}
#breadcrumb {
  flex: 1;
  font-size: 12px;
  color: var(--text-muted);
  font-family: var(--font-mono);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
#breadcrumb span { color: var(--text-dim); margin: 0 4px; }
.topbar-actions {
  display: flex;
  gap: 6px;
  align-items: center;
  flex-shrink: 0;
}
.btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 6px 16px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.03em;
  transition: background var(--transition), color var(--transition), border-color var(--transition), box-shadow var(--transition), transform 0.1s;
  white-space: nowrap;
}
.btn:active { transform: scale(0.97); }
.btn-primary {
  background: var(--btn-primary);
  color: #fff;
  border: 1px solid transparent;
}
.btn-primary:hover {
  background: var(--btn-primary-hover);
  box-shadow: 0 0 14px 3px var(--accent-glow), 0 0 0 1px var(--accent);
}
.btn-ghost {
  background: var(--btn-ghost);
  color: var(--text-dim);
  border: 1px solid var(--border);
}
.btn-ghost:hover {
  background: var(--btn-ghost-hover);
  color: var(--accent);
  border-color: var(--border-active);
  box-shadow: 0 0 10px 2px var(--accent-glow), 0 0 0 1px var(--border-active);
}
.btn-icon {
  padding: 6px 10px;
  background: var(--btn-ghost);
  color: var(--text-dim);
  border: 1px solid var(--border);
  border-radius: 999px;
  font-size: 14px;
  transition: background var(--transition), color var(--transition), box-shadow var(--transition);
}
.btn-icon:hover {
  background: var(--btn-ghost-hover);
  color: var(--accent);
  border-color: var(--border-active);
  box-shadow: 0 0 10px 2px var(--accent-glow), 0 0 0 1px var(--border-active);
}

/* ─── MAIN CONTENT AREA ─── */
#content {
  flex: 1;
  overflow: hidden;
  position: relative;
}

/* ─── PAGES ─── */
.page {
  position: absolute;
  inset: 0;
  overflow-y: auto;
  display: none;
  padding: 24px;
}
.page.active { display: block; }

/* ─── HOME PAGE ─── */
#home-header {
  margin-bottom: 24px;
}
#home-header h1 {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--text);
  margin-bottom: 4px;
}
#home-header p {
  font-size: 13px;
  color: var(--text-muted);
  font-family: var(--font-mono);
}
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
}
.template-card {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px;
  cursor: pointer;
  transition: background var(--transition), border-color var(--transition), transform 0.12s;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.template-card:hover {
  background: var(--card-hover);
  border-color: var(--border-active);
  transform: translateY(-1px);
}
.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.card-tag {
  font-family: var(--font-mono);
  font-size: 18px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 0.06em;
}
.card-status {
  display: flex;
  gap: 3px;
}
.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--status-empty);
  transition: background var(--transition);
}
.status-dot.filled { background: var(--status-filled); }
.card-name {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}
.card-desc {
  font-size: 12px;
  color: var(--text-muted);
  line-height: 1.4;
}
.card-fields-count {
  font-size: 11px;
  color: var(--text-dim);
  font-family: var(--font-mono);
}

/* ─── TEMPLATE PAGE ─── */
.template-page {
  display: none;
  position: absolute;
  inset: 0;
}
.template-page.active { display: flex; flex-direction: column; }

/* Desktop layout: side-by-side */
.template-body {
  flex: 1;
  display: flex;
  overflow: hidden;
}
.fields-panel {
  width: 50%;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.preview-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.panel-header {
  padding: 14px 20px 10px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.panel-title {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text-muted);
}
.panel-actions {
  display: flex;
  gap: 6px;
}
.fields-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.field-group {
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.field-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-dim);
}
.field-input {
  width: 100%;
  background: var(--bg-3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  padding: 8px 10px;
  font-size: 13px;
  resize: vertical;
  min-height: 70px;
  transition: border-color var(--transition), background var(--transition);
  line-height: 1.5;
}
.field-input:focus {
  border-color: var(--border-active);
  background: var(--bg-2);
}
.field-input.single-line {
  min-height: unset;
  height: 36px;
  resize: none;
}

/* Preview */
.preview-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
}
.preview-block {
  background: var(--preview-bg);
  border: 1px solid var(--preview-border);
  border-radius: var(--radius-lg);
  padding: 16px;
  font-family: var(--font-mono);
  font-size: 12.5px;
  line-height: 1.7;
  color: var(--text);
  white-space: pre-wrap;
  word-break: break-word;
  min-height: 120px;
}
.preview-block .preview-label {
  color: var(--accent);
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 0.1em;
}
.preview-block .preview-value {
  color: var(--text);
}
.preview-block .preview-empty {
  color: var(--text-muted);
  font-style: italic;
}
.preview-meta {
  display: flex;
  gap: 8px;
  margin-top: 10px;
  flex-wrap: wrap;
}
.meta-tag {
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 20px;
  background: var(--tag-bg);
  color: var(--accent);
  font-family: var(--font-mono);
}

/* ─── MOBILE TABS ─── */
.mobile-tabs {
  display: none;
  border-bottom: 1px solid var(--border);
  background: var(--bg-2);
  flex-shrink: 0;
}
.mobile-tabs button {
  flex: 1;
  padding: 10px;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  background: transparent;
  color: var(--text-muted);
  border-bottom: 2px solid transparent;
  transition: color var(--transition), border-color var(--transition);
}
.mobile-tabs button.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

/* ─── TEMPLATE HEADER ─── */
.template-header {
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-2);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.template-id {
  display: flex;
  align-items: center;
  gap: 10px;
}
.template-acronym {
  font-family: var(--font-mono);
  font-size: 20px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 0.06em;
}
.template-fullname {
  font-size: 12px;
  color: var(--text-muted);
  font-weight: 500;
}
.template-header-actions {
  display: flex;
  gap: 6px;
}

/* ─── BOTTOM NAV ─── */
#bottom-nav {
  height: var(--bottomnav-h);
  min-height: var(--bottomnav-h);
  background: var(--bg-2);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  flex-shrink: 0;
}
#bottom-nav.hidden { display: none; }
.nav-btn {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 8px 18px;
  border-radius: 999px;
  background: var(--bg-3);
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  transition: background var(--transition), color var(--transition), border-color var(--transition), box-shadow var(--transition), transform 0.1s;
}
.nav-btn:hover {
  background: var(--btn-ghost-hover);
  color: var(--accent);
  border-color: var(--border-active);
  box-shadow: 0 0 10px 2px var(--accent-glow), 0 0 0 1px var(--border-active);
}
.nav-btn:active { transform: scale(0.97); }
.nav-btn:disabled { opacity: 0.3; cursor: not-allowed; box-shadow: none; }
.dot-indicators {
  display: flex;
  gap: 5px;
  align-items: center;
}
.nav-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--border);
  cursor: pointer;
  transition: background var(--transition), transform 0.12s;
}
.nav-dot.active {
  background: var(--accent);
  transform: scale(1.3);
}
.nav-dot:hover { background: var(--text-dim); }

/* ─── TOAST ─── */
#toast-container {
  position: fixed;
  bottom: calc(var(--bottomnav-h) + 12px);
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  gap: 6px;
  z-index: 9999;
  pointer-events: none;
}
.toast {
  background: var(--toast-bg);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 10px 16px;
  font-size: 12.5px;
  font-weight: 500;
  white-space: nowrap;
  animation: toastIn 0.22s ease, toastOut 0.22s ease 2.5s forwards;
  display: flex;
  align-items: center;
  gap: 7px;
}
.toast.success { border-color: var(--status-filled); }
.toast.error { border-color: #ef4444; }
.toast.info { border-color: var(--accent); }
@keyframes toastIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes toastOut {
  from { opacity: 1; transform: translateY(0); }
  to { opacity: 0; transform: translateY(-6px); }
}

/* ─── OVERVIEW MODAL ─── */
#overview-modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
#overview-modal.open { display: flex; }
.modal-box {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  width: 100%;
  max-width: 640px;
  max-height: 80vh;
  overflow-y: auto;
}
.modal-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.modal-header h2 {
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.05em;
}
.modal-body { padding: 16px 20px; }
.overview-row {
  display: flex;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  gap: 12px;
  cursor: pointer;
}
.overview-row:last-child { border-bottom: none; }
.overview-row:hover .overview-name { color: var(--accent); }
.overview-acro {
  font-family: var(--font-mono);
  font-size: 16px;
  font-weight: 700;
  color: var(--accent);
  width: 60px;
  flex-shrink: 0;
}
.overview-name {
  flex: 1;
  font-size: 13px;
  font-weight: 500;
  transition: color var(--transition);
}
.overview-dots {
  display: flex;
  gap: 3px;
}
.overview-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--status-empty);
}
.overview-dot.filled { background: var(--status-filled); }

/* ─── SYNC CONFIG ─── */
#sync-modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
#sync-modal.open { display: flex; }
.sync-form {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.sync-form input {
  width: 100%;
  background: var(--bg-3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  padding: 8px 10px;
  font-size: 13px;
  font-family: var(--font-mono);
}
.sync-form input:focus { border-color: var(--border-active); }
.sync-form label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-dim);
  display: block;
  margin-bottom: 4px;
}

/* ─── RESPONSIVE ─── */

/* 900px: shrink fields panel */
@media (max-width: 900px) {
  .fields-panel { width: 48%; }
}

/* 640px: switch to mobile tab layout */
@media (max-width: 640px) {
  #topbar { padding: 0 10px; gap: 8px; }
  #logo { font-size: 11px; }
  .page { padding: 14px; }
  .card-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; }
  .mobile-tabs { display: flex; }
  .template-body {
    flex-direction: column;
    overflow: hidden;
  }
  .fields-panel {
    width: 100%;
    border-right: none;
    border-bottom: 1px solid var(--border);
    display: none;
  }
  .fields-panel.mob-active { display: flex; }
  .preview-panel {
    display: none;
    border-top: none;
  }
  .preview-panel.mob-active { display: flex; }
  .btn { padding: 5px 8px; font-size: 11px; }
  .btn-icon { padding: 5px 7px; }
  .panel-header { padding: 10px 14px; }
  .fields-scroll { padding: 12px 14px; }
  .preview-scroll { padding: 12px 14px; }
}

/* 380px: very small phones */
@media (max-width: 380px) {
  #logo { display: none; }
  #breadcrumb { font-size: 11px; }
  .template-acronym { font-size: 16px; }
  .template-fullname { display: none; }
  .topbar-actions .btn span { display: none; }
}

/* Landscape short screens */
@media (max-height: 500px) {
  #topbar { height: 40px; min-height: 40px; }
  #bottom-nav { height: 42px; min-height: 42px; }
  .panel-header { padding: 8px 16px; }
  .fields-scroll { padding: 8px 16px; gap: 8px; }
  .field-input { min-height: 50px; }
}
</style>
</head>
<body>

<!-- ─── TOPBAR ─── -->
<div id="topbar">
  <div id="logo">PE//DASH</div>
  <div id="breadcrumb"><span id="bc-root" style="cursor:pointer" onclick="goHome()">HOME</span> <span id="bc-sep" style="display:none">›</span> <span id="bc-page"></span></div>
  <div class="topbar-actions">
    <button class="btn btn-ghost" onclick="openOverview()"><span>⊞</span><span>Overview</span></button>
    <button class="btn btn-ghost" onclick="importExcel()"><span>↑</span><span>Import</span></button>
    <button class="btn btn-primary" onclick="exportExcel()"><span>↓</span><span>Export</span></button>
    <button class="btn-icon" onclick="toggleTheme()" id="theme-btn" title="Toggle theme">◐</button>
  </div>
</div>

<!-- ─── CONTENT ─── -->
<div id="content">

  <!-- HOME PAGE -->
  <div class="page active" id="page-home">
    <div id="home-header">
      <h1>Prompt Engineering Dashboard</h1>
      <p>9 structured templates · fill, preview, export, sync</p>
    </div>
    <div class="card-grid" id="card-grid">
      <!-- Cards injected by JS -->
    </div>
  </div>

  <!-- TEMPLATE PAGES (9) injected by JS -->

</div><!-- /content -->

<!-- ─── BOTTOM NAV ─── -->
<div id="bottom-nav" class="hidden">
  <button class="nav-btn" id="btn-prev" onclick="navTemplate(-1)">‹ Prev</button>
  <div class="dot-indicators" id="dot-row"></div>
  <button class="nav-btn" id="btn-next" onclick="navTemplate(1)">Next ›</button>
</div>

<!-- ─── TOAST CONTAINER ─── -->
<div id="toast-container"></div>

<!-- ─── OVERVIEW MODAL ─── -->
<div id="overview-modal">
  <div class="modal-box">
    <div class="modal-header">
      <h2>ALL TEMPLATES — FILL STATUS</h2>
      <button class="btn-icon" onclick="closeOverview()">✕</button>
    </div>
    <div class="modal-body" id="overview-body"></div>
  </div>
</div>

<!-- ─── SYNC CONFIG MODAL ─── -->
<div id="sync-modal">
  <div class="modal-box">
    <div class="modal-header">
      <h2>GOOGLE SHEETS SYNC</h2>
      <button class="btn-icon" onclick="closeSyncModal()">✕</button>
    </div>
    <div class="modal-body">

/* ═══════════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════════ */
const LS_DATA_KEY = 'pe_dashboard_data_v1';
const LS_THEME_KEY = 'pe_dashboard_theme_v1';
const LS_SCRIPT_KEY = 'pe_dashboard_script_url_v1';
const LS_MOBILE_TAB = 'pe_dashboard_mob_tab_v1';

let state = {
  currentView: 'home',   // 'home' | template ID
  currentIdx: 0,         // 0-8 index for template nav
  data: {},              // { templateId: { fieldKey: value } }
  mobileTab: {},         // { templateId: 'fields' | 'preview' }
};

/* ─── LOAD ─── */
function loadState() {
  try {
    const saved = localStorage.getItem(LS_DATA_KEY);
    if (saved) state.data = JSON.parse(saved);
  } catch(e) {}
  TEMPLATES.forEach(t => {
    if (!state.data[t.id]) state.data[t.id] = {};
    if (!state.mobileTab[t.id]) state.mobileTab[t.id] = 'fields';
  });
}

function saveData() {
  try { localStorage.setItem(LS_DATA_KEY, JSON.stringify(state.data)); } catch(e) {}
}

/* ─── THEME ─── */
function loadTheme() {
  const saved = localStorage.getItem(LS_THEME_KEY) || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
}

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem(LS_THEME_KEY, next);
  toast('Theme: ' + next, 'info');
}

/* ═══════════════════════════════════════════════
   BUILD DOM
   ═══════════════════════════════════════════════ */
function buildCards() {
  const grid = document.getElementById('card-grid');
  grid.innerHTML = '';
  TEMPLATES.forEach((t, idx) => {
    const filled = getFilledCount(t);
    const total = t.fields.length;
    const card = document.createElement('div');
    card.className = 'template-card';
    card.onclick = () => openTemplate(idx);
    card.innerHTML = `
      <div class="card-header">
        <span class="card-tag">${t.id}</span>
        <div class="card-status">${t.fields.map(f =>
          `<div class="status-dot${state.data[t.id][f.key] ? ' filled' : ''}"></div>`
        ).join('')}</div>
      </div>
      <div class="card-name">${t.name.split('·')[0].trim()}</div>
      <div class="card-desc">${t.desc}</div>
      <div class="card-fields-count">${filled}/${total} fields filled</div>
    `;
    grid.appendChild(card);
  });
}

function getFilledCount(t) {
  return t.fields.filter(f => (state.data[t.id][f.key]||'').trim()).length;
}

function buildTemplatePages() {
  const content = document.getElementById('content');
  TEMPLATES.forEach((t, idx) => {
    const page = document.createElement('div');
    page.className = 'template-page';
    page.id = `tpage-${t.id}`;

    page.innerHTML = `
      <div class="template-header">
        <div class="template-id">
          <span class="template-acronym">${t.id}</span>
          <span class="template-fullname">${t.name}</span>
        </div>
        <div class="template-header-actions">
          <button class="btn btn-ghost" onclick="clearTemplate('${t.id}')">Clear</button>
          <button class="btn btn-ghost" onclick="copyPrompt('${t.id}')">Copy</button>
          <button class="btn btn-primary" onclick="openSync('${t.id}')">⇄ Sync</button>
        </div>
      </div>
      <div class="mobile-tabs" id="mob-tabs-${t.id}">
        <button id="mob-tab-fields-${t.id}" class="active" onclick="setMobileTab('${t.id}','fields')">Fields</button>
        <button id="mob-tab-preview-${t.id}" onclick="setMobileTab('${t.id}','preview')">Preview</button>
      </div>
      <div class="template-body">
        <div class="fields-panel mob-active" id="fp-${t.id}">
          <div class="panel-header">
            <span class="panel-title">Input Fields</span>
            <div class="panel-actions">
              <button class="btn btn-ghost" style="font-size:11px" onclick="clearTemplate('${t.id}')">Clear all</button>
            </div>
          </div>
          <div class="fields-scroll" id="fs-${t.id}">
            ${t.fields.map(f => `
              <div class="field-group">
                <label class="field-label" for="field-${t.id}-${f.key}">${f.label}</label>
                <textarea class="field-input" id="field-${t.id}-${f.key}"
                  rows="3"
                  data-tid="${t.id}" data-fkey="${f.key}"
                  oninput="onFieldInput(this)"
                ></textarea>
              </div>
            `).join('')}
          </div>
        </div>
        <div class="preview-panel" id="pp-${t.id}">
          <div class="panel-header">
            <span class="panel-title">Assembled Prompt</span>
            <div class="panel-actions">
              <button class="btn btn-ghost" style="font-size:11px" onclick="copyPrompt('${t.id}')">Copy</button>
            </div>
          </div>
          <div class="preview-scroll">
            <div class="preview-block" id="preview-${t.id}"></div>
            <div class="preview-meta" id="pmeta-${t.id}"></div>

}

function buildDots() {
  const row = document.getElementById('dot-row');
  row.innerHTML = '';
  TEMPLATES.forEach((t, i) => {
    const d = document.createElement('div');
    d.className = 'nav-dot';
    d.id = `dot-${i}`;
    d.title = t.id;
    d.onclick = () => openTemplate(i);
    row.appendChild(d);
  });
}

/* ═══════════════════════════════════════════════
   NAVIGATION
   ═══════════════════════════════════════════════ */
function goHome() {
  // hide all template pages
  TEMPLATES.forEach(t => {
    const p = document.getElementById(`tpage-${t.id}`);
    if (p) p.classList.remove('active');
  });
  document.getElementById('page-home').classList.add('active');
  document.getElementById('bottom-nav').classList.add('hidden');
  state.currentView = 'home';
  updateBreadcrumb();
  buildCards();
}

function openTemplate(idx) {
  idx = Math.max(0, Math.min(TEMPLATES.length - 1, idx));
  state.currentIdx = idx;
  const t = TEMPLATES[idx];
  state.currentView = t.id;

  // hide home + other template pages
  document.getElementById('page-home').classList.remove('active');
  TEMPLATES.forEach((tt, i) => {
    const p = document.getElementById(`tpage-${tt.id}`);
    if (p) p.classList.toggle('active', i === idx);
  });

  document.getElementById('bottom-nav').classList.remove('hidden');
  document.getElementById('btn-prev').disabled = idx === 0;
  document.getElementById('btn-next').disabled = idx === TEMPLATES.length - 1;

  // dots
  document.querySelectorAll('.nav-dot').forEach((d, i) => {
    d.classList.toggle('active', i === idx);
  });

  updateBreadcrumb(t);
  populateFields(t);
  updatePreview(t.id);
  applyMobileTab(t.id);
}

function navTemplate(dir) {
  openTemplate(state.currentIdx + dir);
}

function updateBreadcrumb(t) {
  const sep = document.getElementById('bc-sep');
  const pg = document.getElementById('bc-page');
  if (!t) { sep.style.display = 'none'; pg.textContent = ''; return; }
  sep.style.display = 'inline';
  pg.textContent = `${t.id} — ${t.name}`;
}

/* ═══════════════════════════════════════════════
   FIELDS & PREVIEW
   ═══════════════════════════════════════════════ */
function populateFields(t) {
  t.fields.forEach(f => {
    const el = document.getElementById(`field-${t.id}-${f.key}`);
    if (el) el.value = state.data[t.id][f.key] || '';
  });
}

function onFieldInput(el) {
  const tid = el.dataset.tid;
  const fkey = el.dataset.fkey;
  state.data[tid][fkey] = el.value;
  saveData();
  updatePreview(tid);
  updateCardDots(tid);
}

function updatePreview(tid) {
  const t = TEMPLATES.find(x => x.id === tid);
  if (!t) return;
  const v = state.data[tid] || {};
  const assembled = t.assemble(v);
  const el = document.getElementById(`preview-${tid}`);
  if (!el) return;

  const hasAny = t.fields.some(f => (v[f.key]||'').trim());
  if (!hasAny) {
    el.innerHTML = `<span class="preview-empty">Fill fields on the left to assemble the prompt.</span>`;
  } else {
    // Render with labels highlighted
    let html = '';
    const lines = assembled.split('\n');
    lines.forEach(line => {
      if (line.startsWith('[') && line.endsWith(']')) {
        html += `<span class="preview-label">${escHtml(line)}</span>\n`;
      } else {
        html += `<span class="preview-value">${escHtml(line)}</span>\n`;
      }
    });
    el.innerHTML = html;
  }

  // meta tags
  const meta = document.getElementById(`pmeta-${tid}`);
  if (meta) {
    const filled = t.fields.filter(f => (v[f.key]||'').trim()).length;
    meta.innerHTML = `
      <span class="meta-tag">${t.id}</span>
      <span class="meta-tag">${filled}/${t.fields.length} fields</span>
      <span class="meta-tag">${wordCount(assembled)} words</span>
    `;
  }
}

function wordCount(str) {
  return str.trim().split(/\s+/).filter(Boolean).length;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function updateCardDots(tid) {
  const t = TEMPLATES.find(x => x.id === tid);
  if (!t) return;
  const v = state.data[tid] || {};
  // re-render that card's dots
  const allCards = document.querySelectorAll('.template-card');
  const idx = TEMPLATES.findIndex(x => x.id === tid);
  if (allCards[idx]) {
    const statusEl = allCards[idx].querySelector('.card-status');
    if (statusEl) {
      statusEl.innerHTML = t.fields.map(f =>
        `<div class="status-dot${(v[f.key]||'').trim() ? ' filled' : ''}"></div>`
      ).join('');
    }
    const countEl = allCards[idx].querySelector('.card-fields-count');
    if (countEl) countEl.textContent = `${getFilledCount(t)}/${t.fields.length} fields filled`;
  }
}

/* ─── CLEAR ─── */
function clearTemplate(tid) {
  const t = TEMPLATES.find(x => x.id === tid);
  if (!t) return;
  t.fields.forEach(f => {
    state.data[tid][f.key] = '';
    const el = document.getElementById(`field-${tid}-${f.key}`);
    if (el) el.value = '';
  });
  saveData();
  updatePreview(tid);
  updateCardDots(tid);
  toast(`${tid} cleared`, 'info');
}

/* ─── COPY ─── */
function copyPrompt(tid) {
  const t = TEMPLATES.find(x => x.id === tid);
  if (!t) return;
  const text = t.assemble(state.data[tid] || {});
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => toast(`${tid} prompt copied`, 'success'));
  } else {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    toast(`${tid} prompt copied`, 'success');
  }
}

/* ─── MOBILE TABS ─── */
function setMobileTab(tid, tab) {
  state.mobileTab[tid] = tab;
  applyMobileTab(tid);
}

function applyMobileTab(tid) {
  const tab = state.mobileTab[tid] || 'fields';
  const fp = document.getElementById(`fp-${tid}`);
  const pp = document.getElementById(`pp-${tid}`);
  const tbf = document.getElementById(`mob-tab-fields-${tid}`);
  const tbp = document.getElementById(`mob-tab-preview-${tid}`);
  if (!fp || !pp) return;

  // Mobile: only one shown; desktop: both shown (handled via CSS)
  if (window.innerWidth <= 640) {
    fp.classList.toggle('mob-active', tab === 'fields');
    pp.classList.toggle('mob-active', tab === 'preview');
  } else {
    fp.classList.add('mob-active');
    pp.classList.add('mob-active');
  }
  if (tbf) tbf.classList.toggle('active', tab === 'fields');
  if (tbp) tbp.classList.toggle('active', tab === 'preview');
}

window.addEventListener('resize', () => {
  const t = TEMPLATES.find(x => x.id === state.currentView);
  if (t) applyMobileTab(t.id);
});

/* ═══════════════════════════════════════════════
   OVERVIEW MODAL
   ═══════════════════════════════════════════════ */
function openOverview() {
  const body = document.getElementById('overview-body');
  body.innerHTML = '';
  TEMPLATES.forEach((t, idx) => {
    const v = state.data[t.id] || {};
    const row = document.createElement('div');
    row.className = 'overview-row';
    row.onclick = () => { closeOverview(); openTemplate(idx); };
    row.innerHTML = `
      <span class="overview-acro">${t.id}</span>
      <span class="overview-name">${t.name}</span>
      <div class="overview-dots">${t.fields.map(f =>
        `<div class="overview-dot${(v[f.key]||'').trim()?' filled':''}"></div>`
      ).join('')}</div>
    `;
    body.appendChild(row);
  });
  document.getElementById('overview-modal').classList.add('open');
}
function closeOverview() {
  document.getElementById('overview-modal').classList.remove('open');
}

/* ═══════════════════════════════════════════════
   SYNC MODAL
   ═══════════════════════════════════════════════ */
let _syncTid = null;

function openSync(tid) {
  _syncTid = tid;
  const t = TEMPLATES.find(x => x.id === tid);
  document.getElementById('sync-template-label').value = t ? `${t.id} — ${t.name}` : '';
  const saved = localStorage.getItem(LS_SCRIPT_KEY) || '';
  document.getElementById('script-url-input').value = saved;
  document.getElementById('sync-modal').classList.add('open');
}
function closeSyncModal() {
  document.getElementById('sync-modal').classList.remove('open');
}
function saveScriptUrl() {
  const url = document.getElementById('script-url-input').value.trim();
  localStorage.setItem(LS_SCRIPT_KEY, url);
  toast('Script URL saved', 'success');
}

function getScriptUrl() {
  return document.getElementById('script-url-input').value.trim() ||
         localStorage.getItem(LS_SCRIPT_KEY) || '';
}

/* ─── PUSH (POST) ─── */
async function syncPush() {
  const url = getScriptUrl();
  if (!url) { toast('No Script URL set', 'error'); return; }
  const tid = _syncTid;
  const t = TEMPLATES.find(x => x.id === tid);
  if (!t) return;

  const payload = { template: tid, data: state.data[tid] || {} };
  toast(`Pushing ${tid}…`, 'info');
  try {
    const res = await fetch(url, {
      method: 'POST',
      mode: 'no-cors',  // required for file:// and cross-origin Apps Script
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    // no-cors returns opaque response; treat as success if no exception
    toast(`${tid} pushed to Sheet ✓`, 'success');
  } catch(e) {
    toast(`Push failed: ${e.message}`, 'error');
  }
}

/* ─── PULL (GET) ─── */
async function syncPull() {
  const url = getScriptUrl();
  if (!url) { toast('No Script URL set', 'error'); return; }
  const tid = _syncTid;
  const t = TEMPLATES.find(x => x.id === tid);
  if (!t) return;

  toast(`Pulling ${tid}…`, 'info');
  try {
    const res = await fetch(`${url}?template=${encodeURIComponent(tid)}`, {
      method: 'GET',
      mode: 'cors'
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    if (json.status !== 'ok') throw new Error(json.message || 'Unknown error');

    // Merge returned data into state
    Object.assign(state.data[tid], json.data || {});
    saveData();
    populateFields(t);
    updatePreview(tid);
    updateCardDots(tid);
    toast(`${tid} pulled from Sheet ✓`, 'success');
  } catch(e) {
    toast(`Pull failed: ${e.message}`, 'error');
  }
}

/* ═══════════════════════════════════════════════
   EXPORT (EXCEL)
   ═══════════════════════════════════════════════ */
function exportExcel() {
  const wb = XLSX.utils.book_new();

  TEMPLATES.forEach(t => {
    const v = state.data[t.id] || {};
    const rows = [
      ['PE Dashboard Export'],
      ['Template', t.id],
      ['Full Name', t.name],
      [''],
      ['Field', 'Value'],
      ...t.fields.map(f => [f.label, v[f.key] || '']),
      [''],
      ['Assembled Prompt'],
      [t.assemble(v)]
    ];
    const ws = XLSX.utils.aoa_to_sheet(rows);

    // Column widths
    ws['!cols'] = [{ wch: 20 }, { wch: 80 }];

    // Cell styles via cell object (basic)
    XLSX.utils.book_append_sheet(wb, ws, t.id);
  });

  // Summary sheet
  const summaryRows = [
    ['PE Dashboard — Summary'],
    [''],
    ['Template', 'Full Name', 'Fields Filled', 'Total Fields'],
    ...TEMPLATES.map(t => [
      t.id, t.name, getFilledCount(t), t.fields.length
    ])
  ];
  const wsSummary = XLSX.utils.aoa_to_sheet(summaryRows);
  wsSummary['!cols'] = [{ wch: 12 }, { wch: 50 }, { wch: 14 }, { wch: 14 }];
  XLSX.utils.book_append_sheet(wb, wsSummary, '_Summary');

  const fname = `PE_Dashboard_${dateStamp()}.xlsx`;
  XLSX.writeFile(wb, fname);
  toast(`Exported: ${fname}`, 'success');
}

function dateStamp() {
  const d = new Date();
  return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}`;
}
function pad(n) { return String(n).padStart(2,'0'); }

/* ═══════════════════════════════════════════════
   IMPORT (EXCEL)
   ═══════════════════════════════════════════════ */
function importExcel() {
  document.getElementById('file-import').click();
}

function handleImport(evt) {
  const file = evt.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, { type: 'binary' });
      let imported = 0;

      TEMPLATES.forEach(t => {
        const ws = wb.Sheets[t.id];
        if (!ws) return;
        const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });
        // rows[4] = ['Field','Value'] header
        // rows[5..] = data rows
        for (let r = 5; r < rows.length; r++) {
          const row = rows[r];
          if (!row || !row[0]) break; // stop at blank or assembled section
          if (row[0] === '') break;
          // match field label to key
          const fobj = t.fields.find(f => f.label.toLowerCase() === String(row[0]).toLowerCase());
          if (fobj) {
            state.data[t.id][fobj.key] = String(row[1] || '');
            imported++;
          }
        }
        const el = document.getElementById(`field-${t.id}-${t.fields[0]?.key}`);
        if (el) populateFields(t);
        updatePreview(t.id);
        updateCardDots(t.id);
      });

      saveData();
      toast(`Imported ${imported} field(s)`, 'success');
    } catch(err) {
      toast(`Import error: ${err.message}`, 'error');
    }
  };
  reader.readAsBinaryString(file);
  evt.target.value = '';
}

/* ═══════════════════════════════════════════════
   TOAST
   ═══════════════════════════════════════════════ */
function toast(msg, type = 'info') {
  const icon = type === 'success' ? '✓' : type === 'error' ? '✕' : '·';
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span>${icon}</span><span>${escHtml(msg)}</span>`;
  const container = document.getElementById('toast-container');
  container.appendChild(el);
  setTimeout(() => { if (el.parentNode) el.parentNode.removeChild(el); }, 2800);
}

init();
